name: Deploy to Vercel (production)

# Builds and deploys on every push to master from GitHub's runners, so
# deploys don't depend on a local machine's network to Vercel. Requires three
# repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Show current deployment states
        continue-on-error: true
        run: vercel ls waterdem --token="$TOKEN" | head -20
      - name: Clear stale (non-production) deployments
        continue-on-error: true
        run: vercel remove waterdem --safe --yes --token="$TOKEN"
      - name: Deploy to production (Vercel builds from source)
        id: deploy
        run: |
          set -eo pipefail
          URL=$(timeout 600 vercel deploy --prod --yes --token="$TOKEN")
          echo "Deployed: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Confirm production is live
        run: |
          echo "Checking https://waterdem.vercel.app ..."
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://waterdem.vercel.app/guide || echo 000)
            echo "attempt $i: /guide -> $code"
            if [ "$code" = "200" ]; then echo "Production updated."; exit 0; fi
            sleep 6
          done
          echo "Production alias did not reflect /guide=200 yet (may still be propagating)."
