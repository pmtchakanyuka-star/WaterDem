name: Deploy to Vercel (production)

# Builds on GitHub's runner and uploads prebuilt output so Vercel never runs
# the heavy three.js build. Before deploying, cancels any deployment stuck in
# a non-terminal state (BUILDING/QUEUED/INITIALIZING) that would otherwise
# hold Hobby's single build-concurrency slot and make new deploys hang.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID (team id), VERCEL_PROJECT_ID.
on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Cancel deployments stuck building (frees the build slot)
        continue-on-error: true
        run: |
          set -uo pipefail
          API="https://api.vercel.com"
          Q="teamId=${VERCEL_ORG_ID}&projectId=${VERCEL_PROJECT_ID}&limit=100"
          list=$(curl -s -H "Authorization: Bearer ${TOKEN}" "${API}/v6/deployments?${Q}")
          echo "$list" | jq -r '.deployments[] | "\(.uid) \(.state // .readyState) \(.url)"'
          for uid in $(echo "$list" | jq -r '.deployments[] | select((.state // .readyState) as $s | $s=="BUILDING" or $s=="QUEUED" or $s=="INITIALIZING") | .uid'); do
            echo "Canceling stuck deployment $uid"
            curl -s -X PATCH -H "Authorization: Bearer ${TOKEN}" "${API}/v12/deployments/${uid}/cancel?teamId=${VERCEL_ORG_ID}" -o /dev/null -w "  cancel status: %{http_code}\n"
          done
      - name: Remove leftover non-production deployments
        continue-on-error: true
        run: vercel remove waterdem --safe --yes --token="$TOKEN"

      - name: Pull project settings
        run: vercel pull --yes --environment=production --token="$TOKEN"
      - name: Build (on the runner)
        run: vercel build --prod --token="$TOKEN"
      - name: Deploy prebuilt output to production
        id: deploy
        run: |
          set -eo pipefail
          URL=$(timeout 900 vercel deploy --prebuilt --prod --yes --token="$TOKEN")
          echo "Deployed: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Confirm production is live
        if: always()
        run: |
          for i in $(seq 1 25); do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://waterdem.vercel.app/guide || echo 000)
            echo "attempt $i: /guide -> $code"
            if [ "$code" = "200" ]; then echo "Production updated."; exit 0; fi
            sleep 6
          done
          echo "Production alias not yet reflecting /guide=200."
